<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Sửa bài hát - Music App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body class="admin-body">

<div th:replace="~{admin/fragments :: sidebar('songs')}"></div>

<main class="admin-main">
    <div th:replace="~{admin/fragments :: topbar('Sửa bài hát')}"></div>

    <a th:href="@{/songs}" class="back-link">← Quay lại danh sách bài hát</a>



    <div class="admin-form-card">
        <form th:action="@{/songs/update/{id}(id=${song.id})}" th:object="${song}" method="post" enctype="multipart/form-data">
            <p th:if="${#fields != null and #fields.hasErrors('*')}" class="admin-alert admin-alert-error">Vui lòng kiểm tra lại thông tin bên dưới.</p>
            <div class="form-group">
                <label>Tên bài hát</label>
                <input type="text" th:field="*{title}">
                <span class="field-error" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></span>
            </div>

            <div class="form-group">
                <label>Ca sĩ</label>
                <input type="text" th:field="*{artist}">
            </div>

            <div class="form-group">
                <label>Thể loại</label>
                <select name="category.id">
                    <option th:each="c : ${categories}"
                            th:value="${c.id}"
                            th:text="${c.name}"
                            th:selected="${song.category != null and song.category.id == c.id}">
                    </option>
                </select>
            </div>

            <div class="form-group" th:if="${song.coverUrl != null}">
                <label>Ảnh bìa hiện tại</label>
                <img th:src="${song.coverUrl}" class="track-cover" style="width:100px;height:100px;">
            </div>

            <div class="form-group">
                <label>Đổi ảnh bìa (không bắt buộc)</label>
                <input type="file" name="coverFile" accept="image/*">
            </div>

            <div class="form-group">
                <label>Đổi file MP3 (không bắt buộc)</label>
                <input type="file" name="audioFile" accept=".mp3">
            </div>

            <button type="submit" class="btn btn-primary-solid">💾 Lưu thay đổi</button>
        </form>
    </div>
</main>

</body>
</html>
