<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title th:text="${song.title} + ' - Music App'">Chi tiết bài hát</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body class="admin-body">

<div th:replace="~{admin/fragments :: sidebar('songs')}"></div>

<main class="admin-main">
    <div th:replace="~{admin/fragments :: topbar('Chi tiết bài hát')}"></div>

    <a th:href="@{/songs}" class="back-link">← Quay lại danh sách bài hát</a>

    <div class="admin-panel song-detail-panel" style="margin: 0 auto;">
        <img th:if="${song.coverUrl != null}" th:src="${song.coverUrl}" class="song-detail-cover">
        <div th:if="${song.coverUrl == null}" class="song-detail-cover-fallback">🎵</div>

        <h2 style="margin: 0 0 4px;" th:text="${song.title}"></h2>
        <p style="color: var(--text-secondary); margin: 0 0 12px;"
           th:text="${song.artist != null and !song.artist.isEmpty()} ? ${song.artist} : 'Chưa rõ ca sĩ'"></p>

        <span class="badge badge-active" th:if="${song.category != null}" th:text="${song.category.name}"></span>
        <span class="badge badge-neutral" th:if="${song.category == null}">Chưa phân loại</span>

        <audio controls>
            <source th:src="${song.fileUrl}" type="audio/mpeg">
            Trình duyệt của bạn không hỗ trợ phát nhạc.
        </audio>

        <div sec:authorize="isAuthenticated()" style="margin-top:20px; display:flex; justify-content:center; gap:8px;">
            <a th:href="@{/songs/edit/{id}(id=${song.id})}" class="btn btn-edit">Sửa</a>
            <form th:action="@{/songs/delete/{id}(id=${song.id})}" method="post"
                  onsubmit="return confirm('Bạn có chắc muốn xóa bài hát này không?')">
                <button type="submit" class="btn btn-delete">Xóa</button>
            </form>
        </div>
    </div>
</main>

</body>
</html>
