<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Chi tiết bài hát</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5 mb-5">

    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">

            <div class="card shadow-lg border-0">

                <div class="card-body text-center p-5">

                    <img th:src="${song.coverUrl}"
                         class="img-fluid rounded shadow mb-4"
                         style="width:320px;height:320px;object-fit:cover;">

                    <h1 class="fw-bold mb-2"
                        th:text="${song.title}">
                    </h1>

                    <p class="text-muted fs-5 mb-2"
                       th:text="${song.artist}">
                    </p>

                    <span class="badge bg-success mb-4"
                          th:text="${song.category != null ? song.category.name : 'Chưa có thể loại'}">
                    </span>

                    <div class="mt-4">
                        <audio controls class="w-100">
                            <source th:src="${song.fileUrl}" type="audio/mpeg">
                            Trình duyệt của bạn không hỗ trợ phát nhạc.
                        </audio>
                    </div>

                    <div class="d-flex justify-content-center gap-2 mt-4">

                        <a th:href="@{/songs/edit/{id}(id=${song.id})}"
                           class="btn btn-warning">
                            Sửa
                        </a>

                        <a th:href="@{/songs/delete/{id}(id=${song.id})}"
                           class="btn btn-danger"
                           onclick="return confirm('Bạn có chắc muốn xóa bài hát này không?')">
                            Xóa
                        </a>

                        <a href="/songs"
                           class="btn btn-secondary">
                             Quay lại
                        </a>

                    </div>

                </div>

            </div>

        </div>
    </div>

</div>

</body>
</html>
