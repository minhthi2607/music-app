<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Danh sách bài hát - Music App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body class="admin-body">

<div th:replace="~{admin/fragments :: sidebar('songs')}"></div>

<main class="admin-main">
    <div th:replace="~{admin/fragments :: topbar('Bài hát')}"></div>

    <div class="admin-panel">
        <form class="admin-filter-bar" method="get" th:action="@{/songs}">
            <div class="field">
                <label>Tìm kiếm</label>
                <input type="text" name="keyword" placeholder="Tên bài hát hoặc ca sĩ" th:value="${keyword}">
            </div>
            <div class="field-narrow">
                <label>Thể loại</label>
                <select name="categoryId">
                    <option value="">Tất cả thể loại</option>
                    <option th:each="c : ${categories}"
                            th:value="${c.id}"
                            th:text="${c.name}"
                            th:selected="${selectedCategoryId != null and selectedCategoryId == c.id}">
                    </option>
                </select>
            </div>
            <div class="field-narrow">
                <button type="submit" class="btn btn-primary-solid" style="width:100%; padding:9px 12px;">Tìm kiếm</button>
            </div>
        </form>
    </div>

    <div class="admin-panel">
        <div class="admin-topbar" style="margin-bottom:16px;">
            <h3 th:text="'Danh sách bài hát (' + ${#lists.size(songs)} + ')'" style="margin:0; font-size:16px; font-weight:700;"></h3>
            <a sec:authorize="isAuthenticated()" th:href="@{/songs/upload}" class="btn btn-primary-solid">➕ Thêm bài hát</a>
        </div>

        <div class="admin-table-wrapper">
            <table class="admin-table">
                <thead>
                <tr>
                    <th style="width:56px;">STT</th>
                    <th>Bài hát</th>
                    <th style="width:160px;">Thể loại</th>
                    <th style="width:220px;">Hành động</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="song, songStat : ${songs}">
                    <td th:text="${songStat.count}"></td>
                    <td>
                        <div class="track-cell">
                            <img th:if="${song.coverUrl != null}" th:src="${song.coverUrl}" class="track-cover">
                            <div th:if="${song.coverUrl == null}" class="track-cover-fallback">🎵</div>
                            <div>
                                <div class="track-title" th:text="${song.title}"></div>
                                <div class="track-artist" th:text="${song.artist != null and !song.artist.isEmpty()} ? ${song.artist} : 'Chưa rõ ca sĩ'"></div>
                            </div>
                        </div>
                    </td>
                    <td>
                        <span class="badge badge-active" th:if="${song.category != null}" th:text="${song.category.name}"></span>
                        <span class="badge badge-neutral" th:if="${song.category == null}">Chưa phân loại</span>
                    </td>
                    <td>
                        <a th:href="@{/songs/detail/{id}(id=${song.id})}" class="btn btn-view">Xem</a>
                        <a sec:authorize="isAuthenticated()" th:href="@{/songs/edit/{id}(id=${song.id})}" class="btn btn-edit">Sửa</a>
                        <form sec:authorize="isAuthenticated()" th:action="@{/songs/delete/{id}(id=${song.id})}" method="post" style="display:inline"
                              onsubmit="return confirm('Xoá bài hát này?');">
                            <button type="submit" class="btn btn-delete">Xoá</button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(songs)}">
                    <td colspan="4">Chưa có bài hát nào phù hợp.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

</body>
</html>
