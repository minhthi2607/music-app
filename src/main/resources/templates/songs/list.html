<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Danh sách bài hát</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>🎵 Danh sách bài hát</h1>

        <a href="/songs/upload" class="btn btn-primary">
            ➕ Thêm bài hát
        </a>
    </div>
    <div class="card shadow-sm mb-4">

        <div class="card-body">

            <form class="row g-3" method="get" th:action="@{/songs}">

                <div class="col-md-5">

                    <input class="form-control"
                           type="text"
                           name="keyword"
                           placeholder="Tìm theo tên bài hát hoặc ca sĩ"
                           th:value="${keyword}">

                </div>

                <div class="col-md-3">

                    <select class="form-select" name="categoryId">
                        <option value="">Tất cả thể loại</option>

                        <option th:each="c : ${categories}"
                                th:value="${c.id}"
                                th:text="${c.name}"
                                th:selected="${selectedCategoryId != null and selectedCategoryId == c.id}">
                        </option>
                    </select>

                </div>

                <div class="col-md-2">

                    <button class="btn btn-success w-100" type="submit">
                        Tìm kiếm
                    </button>

                </div>

            </form>

        </div>

    </div>

        <div class="card shadow-sm">
        <div class="card-body">

            <table class="table table-hover align-middle">
                <thead class="table-dark">
                <tr>
                    <th style="width:80px;">STT</th>
                    <th>Bài hát</th>
                    <th style="width:180px;">Thể loại</th>
                    <th style="width:260px;">Hành động</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="song, songStat : ${songs}">

                    <!-- STT -->
                    <td th:text="${songStat.count}"></td>

                    <!-- Bài hát -->
                    <td>

                        <div class="d-flex align-items-center">

                            <img th:src="${song.coverUrl}"
                                 width="70"
                                 height="70"
                                 class="rounded shadow-sm"
                                 style="object-fit:cover;">

                            <div class="ms-3">

                                <h5 class="mb-1"
                                    th:text="${song.title}">
                                </h5>

                                <small class="text-muted"
                                       th:text="${song.artist}">
                                </small>

                            </div>

                        </div>

                    </td>

                    <!-- Thể loại -->
                    <td>

        <span class="badge bg-success"
              th:text="${song.category.name}">
        </span>

                    </td>

                    <!-- Hành động -->
                    <td>

                        <a th:href="@{/songs/detail/{id}(id=${song.id})}"
                           class="btn btn-info btn-sm">

                            Xem

                        </a>

                        <a th:href="@{/songs/edit/{id}(id=${song.id})}"
                           class="btn btn-warning btn-sm">

                             Sửa

                        </a>

                        <a th:href="@{/songs/delete/{id}(id=${song.id})}"
                           class="btn btn-danger btn-sm"
                           onclick="return confirm('Bạn có chắc muốn xóa bài hát này không?')">

                            Xóa

                        </a>

                    </td>

                </tr>
                </tbody>
            </table>

        </div>
    </div>

</div>

</body>
</html>
