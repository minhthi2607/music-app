<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Music App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="page-container">

    <div th:replace="~{fragments/layout :: navbar('home')}"></div>

    <main>
        <div class="page-header">
            <div>
                <h1>Bài hát nổi bật</h1>
                <p class="page-subtitle">Những bài hát mới được thêm gần đây.</p>
            </div>
            <a sec:authorize="isAuthenticated()" th:href="@{/playlists}" class="btn btn-secondary">🎶 Playlist của tôi →</a>
        </div>

        <p class="success-msg" th:if="${param.playlistAdded != null}">Đã thêm bài hát vào playlist.</p>
        <p class="error-msg" th:if="${param.playlistError != null}">Không thể thêm bài hát vào playlist. Vui lòng thử lại.</p>

        <div class="song-grid" th:if="${not #lists.isEmpty(songs)}">
            <div class="song-card" th:each="song : ${songs}">
                <div class="song-cover">
                    <img th:if="${song.coverUrl != null}" th:src="${song.coverUrl}">
                    <span th:if="${song.coverUrl == null}">🎵</span>

                    <button type="button"
                            class="play-btn"
                            th:attr="data-src=${song.fileUrl},aria-label='Phát ' + ${song.title}">
                        ▶
                    </button>
                </div>
                <div class="song-info">
                    <div class="song-title" th:text="${song.title}"></div>
                    <div class="song-artist" th:text="${song.artist != null and !song.artist.isEmpty()} ? ${song.artist} : 'Chưa rõ ca sĩ'"></div>
                    <span class="song-genre" th:if="${song.category != null}" th:text="${song.category.name}"></span>
                </div>

                <!-- Them vao playlist: chi hien cho user da dang nhap -->
                <button type="button"
                        class="btn btn-sm btn-secondary open-playlist-modal-btn"
                        sec:authorize="isAuthenticated()"
                        th:attr="data-song-id=${song.id},data-song-title=${song.title}">
                    + Thêm vào playlist
                </button>

                <a sec:authorize="!isAuthenticated()" th:href="@{/auth/login}" class="btn btn-sm btn-secondary add-to-playlist-login">
                    Đăng nhập để lưu vào playlist
                </a>
            </div>
        </div>

        <p class="empty-state" th:if="${#lists.isEmpty(songs)}">Chưa có bài hát nào được duyệt để hiển thị.</p>

        <!-- Phan trang -->
        <div class="pagination" th:if="${totalPages > 1}">
            <a th:if="${hasPrevious}" th:href="@{/(page=${currentPage - 1})}" class="btn btn-sm btn-secondary">← Trang trước</a>
            <span class="pagination-info" th:text="'Trang ' + ${currentPage} + ' / ' + ${totalPages}"></span>
            <a th:if="${hasNext}" th:href="@{/(page=${currentPage + 1})}" class="btn btn-sm btn-secondary">Trang sau →</a>
        </div>
    </main>

</div>

<!-- Popup thêm vào playlist: dùng chung cho tất cả bài hát, JS sẽ điền songId khi mở -->
<div id="playlist-modal-overlay" class="modal-overlay" sec:authorize="isAuthenticated()">
    <div class="modal-box" role="dialog" aria-modal="true" aria-labelledby="playlist-modal-title">
        <div class="modal-header">
            <h3 id="playlist-modal-title">Thêm <span id="playlist-modal-song-title"></span> vào playlist</h3>
            <button type="button" class="modal-close" id="playlist-modal-close" aria-label="Đóng">✕</button>
        </div>

        <form th:action="@{/playlists/add-song}" method="post" class="add-to-playlist-form">
            <input type="hidden" name="songId" id="playlist-modal-song-id">

            <div class="form-group" th:if="${not #lists.isEmpty(userPlaylists)}">
                <label>Chọn playlist có sẵn</label>
                <select name="playlistId">
                    <option value="">-- Không chọn --</option>
                    <option th:each="pl : ${userPlaylists}" th:value="${pl.id}" th:text="${pl.name}"></option>
                </select>
            </div>

            <div class="form-group">
                <label>Hoặc tạo playlist mới</label>
                <input type="text" name="newPlaylistName" placeholder="Tên playlist mới" maxlength="100">
            </div>

            <div class="modal-actions">
                <button type="button" class="btn btn-sm btn-secondary" id="playlist-modal-cancel">Hủy</button>
                <button type="submit" class="btn btn-sm btn-primary">Thêm</button>
            </div>
        </form>
    </div>
</div>

<!-- Một audio dùng chung cho toàn trang -> không thể có 2 bài phát cùng lúc -->
<audio id="global-player" preload="none"></audio>

<script th:inline="javascript">
    document.addEventListener('DOMContentLoaded', function () {
        const player = document.getElementById('global-player');
        let currentBtn = null;

        function resetButton(btn) {
            btn.classList.remove('playing');
            btn.textContent = '▶';
        }

        document.querySelectorAll('.play-btn').forEach(function (btn) {
            btn.addEventListener('click', function () {
                const isThisOnePlaying = btn.classList.contains('playing');

                // Nếu đang có bài khác phát -> tắt icon của nút đó trước
                if (currentBtn && currentBtn !== btn) {
                    resetButton(currentBtn);
                }

                if (isThisOnePlaying) {
                    player.pause();
                    resetButton(btn);
                    currentBtn = null;
                } else {
                    player.src = btn.dataset.src;
                    player.play();
                    btn.classList.add('playing');
                    btn.textContent = '⏸';
                    currentBtn = btn;
                }
            });
        });

        // Bài hát phát xong -> icon tự quay lại trạng thái play
        player.addEventListener('ended', function () {
            if (currentBtn) {
                resetButton(currentBtn);
                currentBtn = null;
            }
        });

        // ===== Popup thêm vào playlist =====
        const modalOverlay = document.getElementById('playlist-modal-overlay');
        const modalSongIdInput = document.getElementById('playlist-modal-song-id');
        const modalSongTitle = document.getElementById('playlist-modal-song-title');
        const modalCloseBtn = document.getElementById('playlist-modal-close');
        const modalCancelBtn = document.getElementById('playlist-modal-cancel');

        function openPlaylistModal(songId, songTitle) {
            if (!modalOverlay) return;
            modalSongIdInput.value = songId;
            modalSongTitle.textContent = songTitle;
            modalOverlay.classList.add('open');
            document.body.classList.add('modal-open');
        }

        function closePlaylistModal() {
            if (!modalOverlay) return;
            modalOverlay.classList.remove('open');
            document.body.classList.remove('modal-open');
        }

        document.querySelectorAll('.open-playlist-modal-btn').forEach(function (btn) {
            btn.addEventListener('click', function () {
                openPlaylistModal(btn.dataset.songId, btn.dataset.songTitle);
            });
        });

        if (modalCloseBtn) modalCloseBtn.addEventListener('click', closePlaylistModal);
        if (modalCancelBtn) modalCancelBtn.addEventListener('click', closePlaylistModal);

        // Bấm ra ngoài vùng popup -> đóng
        if (modalOverlay) {
            modalOverlay.addEventListener('click', function (e) {
                if (e.target === modalOverlay) closePlaylistModal();
            });
        }

        // Nhấn Esc -> đóng
        document.addEventListener('keydown', function (e) {
            if (e.key === 'Escape') closePlaylistModal();
        });
    });
</script>

</body>
</html>
