<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập - Music App</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="auth-container">
    <h2>Đăng nhập</h2>

    <p th:if="${param.registered}" class="success-msg">Đăng ký thành công! Vui lòng đăng nhập.</p>
    <p th:if="${param.logout}" class="success-msg">Bạn đã đăng xuất.</p>
    <p th:if="${param.error}" class="error-msg">Bạn cần đăng nhập để truy cập trang này.</p>
    <p th:if="${errorMessage}" class="error-msg" th:text="${errorMessage}"></p>

    <form th:action="@{/auth/login}" th:object="${loginRequest}" method="post">
        <div class="form-group">
            <label>Username</label>
            <input type="text" th:field="*{username}" required>
        </div>
        <div class="form-group">
            <label>Mật khẩu</label>
            <input type="password" th:field="*{password}" required>
        </div>
        <button type="submit">Đăng nhập</button>
    </form>

    <p>Chưa có tài khoản? <a th:href="@{/auth/register}">Đăng ký ngay</a></p>
</div>
</body>
</html>
