<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Quản lý người dùng - Music Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body class="admin-body">

<div th:replace="~{admin/fragments :: sidebar('users')}"></div>

<main class="admin-main">
    <div th:replace="~{admin/fragments :: topbar('Quản lý người dùng')}"></div>

    <p th:if="${param.error == 'cannot_disable_self'}" class="admin-alert admin-alert-error">Không thể tự khóa chính tài khoản đang đăng nhập.</p>
    <p th:if="${param.error == 'cannot_demote_self'}" class="admin-alert admin-alert-error">Không thể tự hạ quyền chính mình.</p>
    <p th:if="${param.error == 'cannot_delete_self'}" class="admin-alert admin-alert-error">Không thể tự xóa chính mình.</p>
    <p th:if="${param.updated}" class="admin-alert admin-alert-success">Cập nhật thông tin người dùng thành công.</p>

    <div class="admin-panel">
        <h3 th:text="'Danh sách người dùng (' + ${#lists.size(users)} + ')'"></h3>

        <div class="admin-table-wrapper">
            <table class="admin-table">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Username</th>
                    <th>Email</th>
                    <th>Role</th>
                    <th>Trạng thái</th>
                    <th>Ngày tạo</th>
                    <th>Hành động</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="user : ${users}">
                    <td th:text="${user.id}"></td>
                    <td th:text="${user.username}"></td>
                    <td th:text="${user.email}"></td>
                    <td>
                        <span class="badge" th:classappend="${user.role.name() == 'ADMIN'} ? 'badge-admin' : 'badge-user'"
                              th:text="${user.role}"></span>
                    </td>
                    <td>
                        <span class="badge" th:classappend="${user.enabled} ? 'badge-active' : 'badge-locked'"
                              th:text="${user.enabled} ? 'Hoạt động' : 'Đã khóa'"></span>
                    </td>
                    <td th:text="${#temporals.format(user.createdAt, 'dd/MM/yyyy HH:mm')}"></td>
                    <td>
                        <a th:href="@{/users/{id}/edit(id=${user.id})}" class="btn btn-edit">Sửa</a>

                        <form th:action="@{/users/{id}/toggle-enabled(id=${user.id})}" method="post" style="display:inline">
                            <button type="submit" class="btn btn-toggle" th:text="${user.enabled} ? 'Khóa' : 'Mở khóa'"></button>
                        </form>

                        <form th:action="@{/users/{id}/change-role(id=${user.id})}" method="post" style="display:inline">
                            <select name="role">
                                <option value="USER" th:selected="${user.role.name() == 'USER'}">USER</option>
                                <option value="ADMIN" th:selected="${user.role.name() == 'ADMIN'}">ADMIN</option>
                            </select>
                            <button type="submit" class="btn btn-role">Đổi role</button>
                        </form>

                        <form th:action="@{/users/{id}/delete(id=${user.id})}" method="post" style="display:inline"
                              onsubmit="return confirm('Xác nhận xóa user này?');">
                            <button type="submit" class="btn btn-delete">Xóa</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

</body>
</html>
