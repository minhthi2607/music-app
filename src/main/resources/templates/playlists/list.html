<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Playlist của tôi - Music App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="page-container">

    <div th:replace="~{fragments/layout :: navbar('playlists')}"></div>

    <main>
        <div class="page-header">
            <div>
                <h1>Playlist của tôi</h1>
                <p class="page-subtitle">Danh sách playlist cá nhân bạn đã tạo.</p>
            </div>
        </div>

        <p class="success-msg" th:if="${param.playlistAdded != null}">Đã thêm bài hát vào playlist.</p>
        <p class="error-msg" th:if="${param.playlistError != null}">Không thể thêm bài hát vào playlist. Vui lòng thử lại.</p>

        <!-- Tao playlist moi -->
        <div class="form-card">
            <h3>Tạo playlist mới</h3>
            <form th:action="@{/playlists/create}" method="post" style="display:flex; gap:10px; flex-wrap:wrap; align-items:flex-end;">
                <div class="form-group" style="flex:1 1 260px; margin-bottom:0;">
                    <label>Tên playlist</label>
                    <input type="text" name="name" placeholder="Ví dụ: Nhạc chill cuối tuần" maxlength="100" required>
                </div>
                <button type="submit" class="btn btn-primary">+ Tạo playlist</button>
            </form>
        </div>

        <!-- Danh sach playlist -->
        <div class="song-grid" th:if="${not #lists.isEmpty(playlists)}">
            <div class="song-card" th:each="playlist : ${playlists}">
                <div class="song-info">
                    <div class="song-title" th:text="${playlist.name}"></div>
                    <div class="song-artist"
                         th:text="${songCounts.get(playlist.id) != null ? songCounts.get(playlist.id) : 0} + ' bài hát'"></div>
                </div>
                <div style="display:flex; gap:8px; margin-top:10px;">
                    <a th:href="@{/playlists/{id}(id=${playlist.id})}" class="btn btn-sm btn-secondary">Xem</a>
                    <form th:action="@{/playlists/{id}/delete(id=${playlist.id})}" method="post"
                          onsubmit="return confirm('Xoá playlist này? Toàn bộ bài hát trong playlist sẽ bị gỡ (không xoá bài hát gốc).');">
                        <button type="submit" class="btn btn-sm btn-danger">Xoá</button>
                    </form>
                </div>
            </div>
        </div>

        <p class="empty-state" th:if="${#lists.isEmpty(playlists)}">
            Bạn chưa có playlist nào. Hãy tạo playlist đầu tiên ở trên, hoặc bấm "+ Thêm vào playlist" tại trang chủ.
        </p>
    </main>

</div>
</body>
</html>
