<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thêm thể loại - Music App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body class="admin-body">

<div th:replace="~{admin/fragments :: sidebar('categories')}"></div>

<main class="admin-main">
    <div th:replace="~{admin/fragments :: topbar('Thêm thể loại')}"></div>

    <a th:href="@{/categories}" class="back-link">← Quay lại danh sách thể loại</a>

    <div class="admin-form-card">
        <form th:action="@{/categories/create}" th:object="${category}" method="post">
            <div class="form-group">
                <label>Tên thể loại</label>
                <input type="text" th:field="*{name}" required>
                <span class="field-error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></span>
            </div>

            <button type="submit" class="btn btn-primary-solid">Lưu</button>
        </form>
    </div>
</main>

</body>
</html>
