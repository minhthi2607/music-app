<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Thể loại - Music App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body class="admin-body">

<div th:replace="~{admin/fragments :: sidebar('categories')}"></div>

<main class="admin-main">
    <div th:replace="~{admin/fragments :: topbar('Thể loại')}"></div>

    <div class="admin-panel">
        <div class="admin-topbar" style="margin-bottom:16px;">
            <h3 th:text="'Danh sách thể loại (' + ${#lists.size(categories)} + ')'" style="margin:0; font-size:16px; font-weight:700;"></h3>
            <div>
                <a th:href="@{/songs}" class="btn btn-edit">🎵 Danh sách bài hát</a>
                <a sec:authorize="hasRole('ADMIN')" th:href="@{/categories/create}" class="btn btn-primary-solid">➕ Thêm thể loại</a>
            </div>
        </div>

        <div class="admin-table-wrapper">
            <table class="admin-table">
                <thead>
                <tr>
                    <th style="width:56px;">STT</th>
                    <th>Tên thể loại</th>
                    <th style="width:180px;">Hành động</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="category, stat : ${categories}">
                    <td th:text="${stat.count}"></td>
                    <td th:text="${category.name}"></td>
                    <td sec:authorize="hasRole('ADMIN')">
                        <a th:href="@{/categories/edit/{id}(id=${category.id})}" class="btn btn-edit">Sửa</a>
                        <form th:action="@{/categories/delete/{id}(id=${category.id})}" method="post" style="display:inline"
                              onsubmit="return confirm('Xoá thể loại này?');">
                            <button type="submit" class="btn btn-delete">Xoá</button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(categories)}">
                    <td colspan="3">Chưa có thể loại nào.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

</body>
</html>
