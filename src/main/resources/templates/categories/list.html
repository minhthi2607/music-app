<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Danh sách thể loại</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body class="bg-light">

<div class="d-flex justify-content-between align-items-center mb-4">
    <h1>🎼 Thể loại</h1>

    <div>
        <a href="/songs" class="btn btn-secondary">
            🎵 Danh sách bài hát
        </a>

        <a href="/categories/create" class="btn btn-primary">
             Thêm thể loại
        </a>
    </div>
</div>

    <div class="card shadow-sm">
        <div class="card-body">

            <table class="table table-hover align-middle">
                <thead class="table-dark">
                <tr>
                    <th style="width:80px;">STT</th>
                    <th>Tên thể loại</th>
                    <th style="width:220px;">Hành động</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="category, stat : ${categories}">
                    <td th:text="${stat.count}"></td>
                    <td th:text="${category.name}"></td>
                    <td>
                        <a th:href="@{/categories/edit/{id}(id=${category.id})}"
                           class="btn btn-warning btn-sm">
                            Sửa
                        </a>
                        <a th:href="@{/categories/delete/{id}(id=${category.id})}"
                           class="btn btn-danger btn-sm"
                           onclick="return confirm('Bạn có chắc muốn xóa thể loại này không?')">
                            Xóa
                        </a>

                    </td>
                </tr>
                </tbody>
            </table>

        </div>
    </div>

</div>

</body>
</html>
