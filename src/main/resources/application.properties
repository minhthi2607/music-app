spring.application.name=music-app

# ==== MySQL ====
spring.datasource.url=jdbc:mysql://localhost:3306/music_app_db?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==== JPA ====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ==== JWT ====
# Secret key dung de ky token (nen doi thanh chuoi rieng, it nhat 32 ky tu, luu trong bien moi truong khi deploy that)
jwt.secret=ThisIsAVerySecretKeyForMusicAppJWTPleaseChangeIt123456
# Thoi gian song cua token: 24 gio (tinh bang milliseconds)
jwt.expiration=86400000
# Ten cookie luu JWT
jwt.cookie-name=music_app_token

# ==== File upload (chuan bi san cho module Song cua nguoi 2) ====
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB
